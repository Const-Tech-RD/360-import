# Fly.io — https://fly.io/docs/reference/configuration/
app = "catalogo-360import"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  STORAGE_DIR = "/app/persist"
  DATABASE_URL = "sqlite:////app/persist/data/catalog.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/login"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "catalog_storage"
  destination = "/app/persist"
